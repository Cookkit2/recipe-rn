name: Deploy

on:
  push:
    branches:
      - main
      - master
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: "20"

jobs:
  # Staging Deployment
  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/staging' || github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.cookkit.app
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build application
        run: bun run build
        env:
          NODE_ENV: staging

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # Example: AWS S3, Vercel, Netlify, etc.

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Staging deployment successful"
          # Add Slack/Discord/Teams notification here

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Staging deployment failed, initiating rollback..."
          # Add rollback commands here

  # Production Deployment
  deploy-production:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://cookkit.app
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Run security audit
        run: bun audit --audit-level=high

      - name: Build application
        run: bun run build
        env:
          NODE_ENV: production

      - name: Create deployment backup
        run: |
          echo "Creating backup before deployment..."
          # Add backup creation commands here

      - name: Blue-Green Deployment
        run: |
          echo "Starting blue-green deployment..."
          # Add blue-green deployment logic here
          # 1. Deploy to green environment
          # 2. Run health checks on green
          # 3. Switch traffic to green
          # 4. Keep blue for rollback

      - name: Health Check
        run: |
          echo "Running health checks..."
          # Add health check commands here
          # Example: curl -f https://cookkit.app/health || exit 1

      - name: Smoke Tests
        run: |
          echo "Running smoke tests..."
          # Add smoke test commands here

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment successful"
          # Add Slack/Discord/Teams notification here

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Production deployment failed, initiating rollback..."
          # Add rollback commands here
          # 1. Switch traffic back to blue
          # 2. Verify blue is healthy
          # 3. Clean up green environment

  # Mobile App Build (iOS/Android)
  build-mobile:
    name: Build Mobile Apps
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [ios, android]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build ${{ matrix.platform }}
        run: eas build --platform ${{ matrix.platform }} --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}-build
          path: |
            *.apk
            *.ipa
          retention-days: 30

  # Submit to App Stores
  submit-mobile:
    name: Submit to App Stores
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: build-mobile
    steps:
      - uses: actions/checkout@v6

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to iOS App Store
        run: eas submit --platform ios --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Submit to Google Play
        run: eas submit --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Notify submission success
        if: success()
        run: |
          echo "✅ Successfully submitted to app stores"

  # Deployment Summary
  deployment-summary:
    runs-on: ubuntu-latest
    name: Deployment Summary
    needs: [deploy-staging, deploy-production, build-mobile, submit-mobile]
    if: always()
    steps:
      - name: Check deployment status
        run: |
          echo "Deployment Status:"
          echo "Staging: ${{ needs.deploy-staging.result }}"
          echo "Production: ${{ needs.deploy-production.result }}"
          echo "Mobile Build: ${{ needs.build-mobile.result }}"
          echo "Mobile Submit: ${{ needs.submit-mobile.result }}"

      - name: Create deployment badge
        if: always()
        run: |
          echo "Deployment completed at $(date)"
